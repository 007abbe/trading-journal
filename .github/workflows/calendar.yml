name: Fetch FF calendar
on:
  schedule:
    - cron: '17 */6 * * *'   # var 6:e timme
  workflow_dispatch:          # + manuell körning
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch calendar
        run: |
          mkdir -p data
          curl -sf https://nfs.faireconomy.media/ff_calendar_thisweek.json -o data/ff_calendar.json
          python3 -c "import json;json.load(open('data/ff_calendar.json'))"
      - name: Commit if changed
        run: |
          git config user.name "finski-bot"
          git config user.email "actions@github.com"
          git add data/ff_calendar.json
          git diff --cached --quiet || git commit -m "calendar update"
          git push
